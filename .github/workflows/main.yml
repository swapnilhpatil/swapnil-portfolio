name: CI/CD Portfolio
on:
  push:
    branches:
      - '**'
jobs:
  build-stages:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: build_artifacts
          path: dist
      
